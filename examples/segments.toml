# Multiple scripts — per-entry voice override
# Output: ./segments/segments_000.wav, segments_001.wav (skipped), segments_002.wav
#
# enabled = false skips generation but keeps the entry in the index,
# so output filenames of subsequent entries are not affected.

format = "wav"
model = "mlx-community/Qwen3-TTS-12Hz-0.6B-Base-4bit"

[params]
# Global defaults — overridable per entry
lang_code = "auto"
speed = 1.0
temperature = 0.9
top_k = 50
top_p = 1.0
repetition_penalty = 1.05

[[script]]
text = "Hello, my name is Ryan."
voice = "Ryan"

[[script]]
enabled = false
text = "This entry is disabled. It holds index 001 so the next file stays at 002."
voice = "Vivian"

[[script]]
text = "And this is still segments_002, even though 001 was skipped."
voice = "Ryan"
